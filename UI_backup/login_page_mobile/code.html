<style>
        .glass-panel {
            background: rgba(252, 249, 246, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);

<body class="bg-background text-on-background font-body min-h-screen flex flex-col antialiased selection:bg-primary-fixed selection:text-on-primary-fixed relative overflow-x-hidden">
<!-- Decorative Background Elements for High-End Editorial Feel -->
<div aria-hidden="true" class="fixed inset-0 z-0 pointer-events-none">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-surface-container-highest rounded-full mix-blend-multiply filter blur-[100px] opacity-40"></div>
<div class="absolute top-1/3 -right-32 w-[500px] h-[500px] bg-primary-fixed rounded-full mix-blend-multiply filter blur-[120px] opacity-20"></div>
</div>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center p-6 sm:p-12 z-10 relative">
<div class="w-full max-w-md">
<!-- Login Container (Bento/Glassmorphism blend) -->
<div class="glass-panel rounded-xl ambient-shadow ghost-border overflow-hidden p-8 sm:p-10 transition-all duration-300">
<!-- Branding Header -->
<div class="text-center mb-10">
<h1 class="font-headline italic text-3xl text-primary mb-3">Yoyobolen</h1>
<h2 class="font-headline text-2xl font-bold tracking-tight text-on-surface">The Artisanal Ledger</h2>
<p class="font-body text-sm text-on-surface-variant mt-2 tracking-wide">Secure Access Terminal</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-6" method="POST">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="block font-label text-sm font-medium text-on-surface-variant tracking-wider uppercase" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span aria-hidden="true" class="material-symbols-outlined text-outline text-[20px]">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 bg-surface-container-lowest border-0 rounded-md text-on-surface font-body shadow-sm ring-1 ring-inset ring-outline-variant/30 focus:ring-2 focus:ring-inset focus:ring-primary/20 focus:outline-none transition-shadow" id="email" name="email" placeholder="baker@yoyobolen.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<div class="flex items-center justify-between">
<label class="block font-label text-sm font-medium text-on-surface-variant tracking-wider uppercase" for="password">Password</label>
<a class="font-label text-xs font-semibold text-primary hover:text-primary-container transition-colors" href="#">Forgot?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span aria-hidden="true" class="material-symbols-outlined text-outline text-[20px]">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 bg-surface-container-lowest border-0 rounded-md text-on-surface font-body shadow-sm ring-1 ring-inset ring-outline-variant/30 focus:ring-2 focus:ring-inset focus:ring-primary/20 focus:outline-none transition-shadow" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full gradient-btn text-on-primary rounded-lg py-3.5 px-4 font-label font-medium text-base shadow-sm hover:shadow-md transition-all duration-200 transform hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary focus:ring-offset-surface" type="submit">
                            Sign In to Ledger
                        </button>
</div>
</form>
</div>
<!-- Optional Image/Texture Element beneath form for added editorial depth -->
<div class="mt-8 text-center">
<img alt="Artisanal bakery scene" class="w-24 h-24 object-cover rounded-full mx-auto opacity-60 mix-blend-luminosity hover:mix-blend-normal transition-all duration-500 ghost-border" data-alt="close up of warm golden pastry dough on marble counter with soft natural lighting and flour dusting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD-LYmNUHf6qpAC11YEKHaAp2CkdtS1a2f935EYPZre-WglUaIKKpK3-vreG-lKSRis5_OMauqn1AHQSBnKMSyVXO3t-6Mph_gEdSdz32DLUkgihxxrNjvNAqZIz4D74R3LfAyyp0nZxnYThywmEOQX0LT9qH-rxWUKbo86VFCZcpWcywC91ga6qNmSoE-Bl6a1n4UaYSfF_MJ2piOeDBspoTdnrmuaKR2je3UaBPLn1yUwE0xq6UFHjhmFnv6wgbzRwjSkBNrgUpM2"/>
</div>

<div class="text-[#8d4b00] dark:text-[#d97706] font-['Inter'] text-sm tracking-wide mb-4 md:mb-0">

        </div>
<nav class="flex gap-6">
<a class="font-['Inter'] text-sm tracking-wide text-stone-500 dark:text-stone-500 hover:text-[#8d4b00] underline decoration-[#8d4b00]/30 opacity-80 hover:opacity-100 transition-all duration-200" href="#">
                    Privacy Policy
                </a>
<a class="font-['Inter'] text-sm tracking-wide text-stone-500 dark:text-stone-500 hover:text-[#8d4b00] underline decoration-[#8d4b00]/30 opacity-80 hover:opacity-100 transition-all duration-200" href="#">
                    Terms of Service
                </a>
<a class="font-['Inter'] text-sm tracking-wide text-stone-500 dark:text-stone-500 hover:text-[#8d4b00] underline decoration-[#8d4b00]/30 opacity-80 hover:opacity-100 transition-all duration-200" href="#">
                    Security Architecture
                </a>
</nav>
</footer>
